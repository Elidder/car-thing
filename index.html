<style>
:root{--g:#1DB954;--g2:#1ed760;--bg:#0a0a0a;--s1:#141414;--s2:#1e1e1e;--s3:#282828;--txt:#fff;--mu:#a0a0a0;--dim:#535353;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,'Helvetica Neue',sans-serif;overflow:hidden;}

/* AUTH */
#auth{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;padding:32px 24px;}
.al{width:60px;height:60px;margin-bottom:20px;}
.at{font-size:24px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px;}
.as{font-size:14px;color:var(--mu);text-align:center;line-height:1.5;margin-bottom:28px;max-width:240px;}
.ab{background:var(--g);color:#000;border:none;border-radius:100px;padding:15px 0;font-size:15px;font-weight:700;width:100%;max-width:260px;cursor:pointer;margin-bottom:20px;transition:background .15s,transform .1s;}
.ab:active{background:var(--g2);transform:scale(.97);}
.am{display:flex;flex-direction:column;align-items:center;gap:8px;}
.aml{font-size:12px;color:var(--dim);}
.pills{display:flex;background:var(--s2);border-radius:100px;padding:3px;gap:2px;}
.pill{padding:6px 18px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--mu);transition:background .15s,color .15s;}
.pill.on{background:var(--s3);color:var(--txt);}

/* PLAYER */
#player{display:none;width:100vw;height:100dvh;position:relative;overflow:hidden;}
#player.show{display:block;}
.amb{position:absolute;inset:0;z-index:0;background:var(--bg);transition:background 1.2s;}
.amb::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,.2) 0%,rgba(0,0,0,.88) 100%);}

/* LANDSCAPE layout */
.lay{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:row;align-items:stretch;}
.aside{flex:0 0 auto;width:min(45vw,100vh);height:100%;position:relative;overflow:hidden;}
.aimg{width:100%;height:100%;object-fit:cover;transition:opacity .4s;display:block;}
.aimg.h{opacity:0;}
.aph{width:100%;height:100%;background:var(--s2);display:flex;align-items:center;justify-content:center;}
.agrad{position:absolute;inset:0;background:linear-gradient(to right,transparent 60%,rgba(0,0,0,.5) 100%);}
.iside{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between;padding:12px 16px 12px 12px;gap:6px;}

/* top */
.trow{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.drow{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mu);min-width:0;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--g);flex-shrink:0;}
.dn{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;}
.cfgb{background:none;border:none;color:var(--dim);cursor:pointer;padding:4px;display:flex;border-radius:50%;transition:color .15s;}
.cfgb:active{color:var(--txt);}

/* track */
.tkrow{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;min-width:0;}
.tkt{min-width:0;flex:1;}
.tkn{font-size:clamp(14px,2.6vw,21px);font-weight:700;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
.tka{font-size:clamp(10px,1.6vw,13px);color:var(--mu);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lbtn{background:none;border:none;color:var(--dim);cursor:pointer;padding:6px;display:flex;flex-shrink:0;transition:color .15s,transform .1s;}
.lbtn.on{color:var(--g);}
.lbtn:active{transform:scale(1.2);}

/* free banner */
.fban{font-size:10px;color:var(--dim);text-align:center;flex-shrink:0;display:none;}
body.free .fban{display:block;}
body.free .prem{opacity:.2;pointer-events:none;}
body.free .volr{opacity:.2;pointer-events:none;}
body.free .pb{pointer-events:none;}

/* progress */
.pw{flex-shrink:0;}
.pb{height:3px;background:var(--s3);border-radius:2px;cursor:pointer;padding:8px 0;margin:-8px 0;position:relative;}
.pt{height:3px;background:var(--s3);border-radius:2px;}
.pf{height:100%;background:#fff;border-radius:2px;width:0%;transition:width .5s linear;}
.ttr{display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--dim);font-variant-numeric:tabular-nums;}

/* controls */
.cr{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.btn{background:none;border:none;color:var(--mu);cursor:pointer;padding:7px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:color .15s,transform .1s;}
.btn:active{transform:scale(.88);color:#fff;}
.btn.on{color:var(--g);}
.pbtn{width:clamp(40px,6vw,52px);height:clamp(40px,6vw,52px);background:#fff;color:#000 !important;border-radius:50%;padding:0;}
.pbtn:active{background:#ddd;transform:scale(.94);}

/* volume */
.volr{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.vi{color:var(--dim);flex-shrink:0;}
input[type=range]{-webkit-appearance:none;flex:1;height:3px;background:var(--s3);border-radius:2px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer;}

/* empty */
.empty{position:absolute;inset:0;z-index:2;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--mu);font-size:14px;}
.empty.show{display:flex;}

/* sheet */
.sheet{position:absolute;inset:0;z-index:20;background:rgba(0,0,0,.85);display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;}
.sheet.open{opacity:1;pointer-events:all;}
.sp{background:var(--s1);border-radius:18px 18px 0 0;padding:18px 20px 36px;transform:translateY(16px);transition:transform .25s cubic-bezier(.34,1.56,.64,1);}
.sheet.open .sp{transform:translateY(0);}
.hdl{width:32px;height:4px;background:var(--s3);border-radius:2px;margin:0 auto 16px;}
.stitle{font-size:15px;font-weight:700;margin-bottom:16px;}
.srow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--s2);}
.srow:last-of-type{border:none;}
.slbl{font-size:14px;}
.ssub{font-size:11px;color:var(--mu);margin-top:2px;}
.slo{margin-top:14px;width:100%;padding:12px;background:none;border:1px solid var(--s3);border-radius:100px;color:#f55;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;}
.slo:active{background:rgba(255,80,80,.1);}

/* idle */
.idle{position:absolute;inset:0;z-index:50;background:rgba(0,0,0,0);pointer-events:none;transition:background 1s;display:flex;align-items:center;justify-content:center;}
.idle.on{background:rgba(0,0,0,.92);pointer-events:all;}
.iclk{font-size:clamp(40px,10vw,72px);font-weight:300;letter-spacing:-2px;color:rgba(255,255,255,.12);opacity:0;transition:opacity 1s;font-variant-numeric:tabular-nums;}
.idle.on .iclk{opacity:1;}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--s2);border:1px solid var(--s3);padding:9px 20px;border-radius:100px;font-size:12px;transition:transform .3s;z-index:100;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>

<script>
const CID='c34376852a164c2d864705cd4f6b8494';
const RURI='https://elidder.github.io/car-thing/callback';
// streaming scope добавлен — без него /me/player возвращает 403 на free аккаунтах
const SCOPE='user-read-playback-state user-modify-playback-state user-read-currently-playing user-library-read user-library-modify';

let tok=null,exp=0,tid=null,playing=false,shuf=false,rep='off',dur=0,prog=0;
let ptick=null,itimer=null,ptimer=null;
let isPrem=localStorage.getItem('sp_mode')!=='free';

function setMode(m){isPrem=m==='premium';localStorage.setItem('sp_mode',m);applyMode();}
function applyMode(){
  document.body.classList.toggle('free',!isPrem);
  ['aFree','sFree'].forEach(id=>document.getElementById(id).classList.toggle('on',!isPrem));
  ['aPrem','sPrem'].forEach(id=>document.getElementById(id).classList.toggle('on',isPrem));
}
function openSheet(){document.getElementById('sheet').classList.add('open');}
function shOut(e){if(e.target===document.getElementById('sheet'))document.getElementById('sheet').classList.remove('open');}

function rnd(){const a=new Uint8Array(64);crypto.getRandomValues(a);return btoa(String.fromCharCode(...a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function ch(v){const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}

async function startAuth(){
  const v=rnd();sessionStorage.setItem('pkce',v);
  const c=await ch(v);
  location.href='https://accounts.spotify.com/authorize?'+new URLSearchParams({client_id:CID,response_type:'code',redirect_uri:RURI,code_challenge_method:'S256',code_challenge:c,scope:SCOPE});
}
async function exchCode(code){
  const r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({client_id:CID,grant_type:'authorization_code',code,redirect_uri:RURI,code_verifier:sessionStorage.getItem('pkce')})});
  const d=await r.json();
  if(d.access_token){saveTok(d);sessionStorage.removeItem('pkce');history.replaceState({},'','/car-thing/');showPlayer();}
  else showToast('Ошибка входа: '+(d.error_description||'?'));
}
function saveTok(d){tok=d.access_token;exp=Date.now()+d.expires_in*1000;localStorage.setItem('sp_tok',tok);localStorage.setItem('sp_exp',exp);if(d.refresh_token)localStorage.setItem('sp_ref',d.refresh_token);}
async function doRefresh(){const r=localStorage.getItem('sp_ref');if(!r)return false;const res=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({client_id:CID,grant_type:'refresh_token',refresh_token:r})});const d=await res.json();if(d.access_token){saveTok(d);return true;}return false;}
async function getTok(){if(tok&&Date.now()<exp-30000)return tok;if(await doRefresh())return tok;logout();return null;}
function logout(){['sp_tok','sp_exp','sp_ref'].forEach(k=>localStorage.removeItem(k));tok=null;document.getElementById('auth').style.display='flex';document.getElementById('player').classList.remove('show');document.getElementById('sheet').classList.remove('open');clearTimeout(ptimer);clearInterval(ptick);}

async function api(path,method='GET',body=null){
  const t=await getTok();if(!t)return null;
  const o={method,headers:{Authorization:'Bearer '+t}};
  if(body){o.headers['Content-Type']='application/json';o.body=JSON.stringify(body);}
  const r=await fetch('https://api.spotify.com/v1'+path,o);
  if(r.status===204||r.status===202)return{};
  if(r.status===401){logout();return null;}
  if(!r.ok)return null;
  return r.json().catch(()=>({}));
}

function showPlayer(){document.getElementById('auth').style.display='none';document.getElementById('player').classList.add('show');fetch_();poll();tickProg();setupIdle();}
function poll(){clearTimeout(ptimer);ptimer=setTimeout(()=>{fetch_();poll();},3000);}

async function fetch_(){
  const data=await api('/me/player');
  if(!data||!data.item){
    document.getElementById('empty').classList.add('show');
    document.getElementById('lay').style.visibility='hidden';
    playing=false;return;
  }
  document.getElementById('empty').classList.remove('show');
  document.getElementById('lay').style.visibility='visible';
  const tr=data.item;
  playing=data.is_playing;dur=tr.duration_ms;prog=data.progress_ms;
  shuf=data.shuffle_state||false;rep=data.repeat_state||'off';
  updPlay();updShuf();updRep();
  if(data.device){document.getElementById('drow').style.visibility='visible';document.getElementById('dn').textContent=data.device.name;document.getElementById('vol').value=data.device.volume_percent||50;}
  document.getElementById('te').textContent=fmt(dur);
  document.getElementById('pf').style.width=(prog/dur*100).toFixed(2)+'%';
  document.getElementById('tn2').textContent=fmt(prog);
  if(tr.id!==tid){
    tid=tr.id;
    document.getElementById('tn').textContent=tr.name;
    document.getElementById('ta').textContent=tr.artists.map(a=>a.name).join(', ')+' · '+tr.album.name;
    const url=tr.album.images?.[0]?.url;
    const img=document.getElementById('aimg'),ph=document.getElementById('aph');
    if(url){img.classList.add('h');img.style.display='block';ph.style.display='none';img.onload=()=>{img.classList.remove('h');setAmb(url);};img.src=url;}
    else{img.style.display='none';ph.style.display='flex';}
    chkLike(tr.id);
  }
}

function setAmb(url){const i=new Image();i.crossOrigin='anonymous';i.onload=()=>{const c=document.createElement('canvas');c.width=c.height=4;const x=c.getContext('2d');x.drawImage(i,0,0,4,4);let r=0,g=0,b=0;for(let a=0;a<4;a++)for(let j=0;j<4;j++){const p=x.getImageData(a,j,1,1).data;r+=p[0];g+=p[1];b+=p[2];}r=Math.round(r/16);g=Math.round(g/16);b=Math.round(b/16);document.getElementById('amb').style.background=`radial-gradient(ellipse at 0% 50%, rgba(${r},${g},${b},.45) 0%, #0a0a0a 65%)`;};i.src=url;}

async function chkLike(id){const d=await api('/me/tracks/contains?ids='+id);const on=d?.[0]===true;document.getElementById('lb').classList.toggle('on',on);document.getElementById('hp').setAttribute('fill',on?'currentColor':'none');}
async function toggleLike(){const btn=document.getElementById('lb'),was=btn.classList.contains('on');btn.classList.toggle('on',!was);document.getElementById('hp').setAttribute('fill',!was?'currentColor':'none');await api('/me/tracks?ids='+tid,was?'DELETE':'PUT');}
async function togglePlay(){if(!isPrem)return;playing=!playing;updPlay();await api('/me/player/'+(playing?'play':'pause'),'PUT');}
function updPlay(){document.getElementById('pi').innerHTML=playing?'<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>':'<polygon points="5 3 19 12 5 21 5 3"/>';}
async function prevTrack(){if(!isPrem)return;await api('/me/player/previous','POST');setTimeout(fetch_,400);}
async function nextTrack(){if(!isPrem)return;await api('/me/player/next','POST');setTimeout(fetch_,400);}
async function toggleShuffle(){if(!isPrem)return;shuf=!shuf;updShuf();await api('/me/player/shuffle?state='+shuf,'PUT');}
function updShuf(){document.getElementById('shb').classList.toggle('on',shuf);}
async function cycleRepeat(){if(!isPrem)return;const s=['off','context','track'];rep=s[(s.indexOf(rep)+1)%3];updRep();await api('/me/player/repeat?state='+rep,'PUT');}
function updRep(){document.getElementById('rb').classList.toggle('on',rep!=='off');}
async function seekTo(e){if(!isPrem)return;const b=e.currentTarget,p=Math.max(0,Math.min(1,(e.clientX-b.getBoundingClientRect().left)/b.offsetWidth));prog=Math.round(p*dur);document.getElementById('pf').style.width=(p*100).toFixed(2)+'%';document.getElementById('tn2').textContent=fmt(prog);await api('/me/player/seek?position_ms='+prog,'PUT');}
let vd;function setVol(v){if(!isPrem)return;clearTimeout(vd);vd=setTimeout(()=>api('/me/player/volume?volume_percent='+v,'PUT'),300);}
function tickProg(){clearInterval(ptick);ptick=setInterval(()=>{if(!playing||dur===0)return;prog=Math.min(prog+1000,dur);document.getElementById('pf').style.width=(prog/dur*100).toFixed(2)+'%';document.getElementById('tn2').textContent=fmt(prog);},1000);}
function fmt(ms){const s=Math.floor(ms/1000);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function setupIdle(){['touchstart','click'].forEach(e=>document.addEventListener(e,resetIdle,{passive:true}));resetIdle();}
function resetIdle(){clearTimeout(itimer);document.getElementById('idle').classList.remove('on');itimer=setTimeout(()=>{document.getElementById('idle').classList.add('on');tickClock();},60000);}
function tickClock(){if(!document.getElementById('idle').classList.contains('on'))return;const n=new Date();document.getElementById('iclk').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');setTimeout(tickClock,10000);}

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});

(async()=>{
  applyMode();
  let s=location.search;
  if(!s&&sessionStorage.getItem('oar')){s=sessionStorage.getItem('oar');sessionStorage.removeItem('oar');}
  const p=new URLSearchParams(s),code=p.get('code');
  if(code){history.replaceState({},'','/car-thing/');await exchCode(code);return;}
  const t=localStorage.getItem('sp_tok'),e=parseInt(localStorage.getItem('sp_exp')||'0'),ref=localStorage.getItem('sp_ref');
  if(t&&(Date.now()<e-30000||ref)){tok=t;exp=e;showPlayer();}
})();
</script>
