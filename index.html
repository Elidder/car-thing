<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Car Thing">
<title>Car Thing</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1DB954;
    --green-bright: #1ed760;
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --surface3: #282828;
    --text: #ffffff;
    --muted: #a0a0a0;
    --dim: #535353;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* ── AUTH ── */
  #auth-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100dvh; padding: 40px 32px; background: var(--bg);
  }
  .auth-icon { width: 72px; height: 72px; margin-bottom: 24px; }
  .auth-title { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 10px; }
  .auth-sub { font-size: 15px; color: var(--muted); text-align: center; line-height: 1.5; margin-bottom: 32px; max-width: 260px; }
  .auth-btn {
    background: var(--green); color: #000; border: none; border-radius: 100px;
    padding: 16px 48px; font-size: 16px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    cursor: pointer; width: 100%; max-width: 280px; transition: background 0.15s, transform 0.1s; margin-bottom: 20px;
  }
  .auth-btn:active { background: var(--green-bright); transform: scale(0.97); }

  .mode-toggle-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .mode-label { font-size: 13px; color: var(--dim); }
  .mode-pills { display: flex; background: var(--surface2); border-radius: 100px; padding: 3px; gap: 2px; }
  .mode-pill {
    padding: 7px 20px; border-radius: 100px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; background: none; color: var(--muted);
    font-family: 'DM Sans', sans-serif; transition: background 0.15s, color 0.15s;
  }
  .mode-pill.active { background: var(--surface3); color: var(--text); }

  /* ── PLAYER ── */
  #player-screen {
    display: none; flex-direction: column; height: 100dvh; position: relative; overflow: hidden;
  }
  #player-screen.visible { display: flex; }

  .ambient-bg {
    position: absolute; inset: 0; background: var(--bg); transition: background 1.2s ease; z-index: 0;
  }
  .ambient-bg::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 60%, rgba(0,0,0,0.95) 100%);
  }

  .player-content {
    position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%;
    padding: env(safe-area-inset-top, 16px) 0 env(safe-area-inset-bottom, 16px);
  }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 8px; flex-shrink: 0;
  }
  .device-info { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .device-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .device-name { max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .settings-btn {
    background: none; border: none; cursor: pointer; color: var(--dim);
    padding: 6px; display: flex; border-radius: 50%; transition: color 0.15s, background 0.15s;
  }
  .settings-btn:active { color: var(--text); background: var(--surface2); }

  /* Settings sheet */
  .settings-sheet {
    position: absolute; inset: 0; z-index: 20;
    background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
    justify-content: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .settings-sheet.open { opacity: 1; pointer-events: all; }
  .settings-panel {
    background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 24px 40px;
    transform: translateY(20px); transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .settings-sheet.open .settings-panel { transform: translateY(0); }
  .settings-handle { width: 36px; height: 4px; background: var(--surface3); border-radius: 2px; margin: 0 auto 20px; }
  .settings-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0; border-bottom: 1px solid var(--surface2);
  }
  .settings-row:last-of-type { border-bottom: none; }
  .settings-row-label { font-size: 15px; }
  .settings-row-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .settings-pills { display: flex; background: var(--surface2); border-radius: 100px; padding: 3px; gap: 2px; }
  .settings-pill {
    padding: 6px 14px; border-radius: 100px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: none; background: none; color: var(--muted);
    font-family: 'DM Sans', sans-serif; transition: background 0.15s, color 0.15s;
  }
  .settings-pill.active { background: var(--surface3); color: var(--text); }
  .settings-logout {
    margin-top: 16px; width: 100%; padding: 13px; background: none;
    border: 1px solid var(--surface3); border-radius: 100px; color: #ff4444;
    font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: background 0.15s;
  }
  .settings-logout:active { background: rgba(255,68,68,0.1); }

  /* Album */
  .album-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 16px 32px; min-height: 0; }
  .album-container {
    width: 100%; aspect-ratio: 1/1; max-height: 100%; max-width: min(100%, 80vh);
    border-radius: 12px; overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,0.8);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .album-container.playing { transform: scale(1); }
  .album-container.paused { transform: scale(0.92); }
  .album-art { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.4s; }
  .album-art.loading { opacity: 0; }
  .album-placeholder { width: 100%; height: 100%; background: var(--surface2); display: flex; align-items: center; justify-content: center; }

  /* Track info */
  .track-section { padding: 4px 28px 0; flex-shrink: 0; }
  .track-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .track-text { min-width: 0; flex: 1; }
  .track-name { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }
  .track-artist { font-size: 14px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .like-btn {
    background: none; border: none; cursor: pointer; color: var(--dim);
    padding: 8px; flex-shrink: 0; display: flex; transition: color 0.15s, transform 0.1s;
  }
  .like-btn.liked { color: var(--green); }
  .like-btn:active { transform: scale(1.2); }

  /* Free mode banner */
  .free-banner {
    display: none; margin: 10px 28px 0; padding: 8px 14px;
    background: var(--surface2); border-radius: 8px;
    font-size: 12px; color: var(--muted); text-align: center; flex-shrink: 0;
  }
  body.free-mode .free-banner { display: block; }
  body.free-mode .premium-only { opacity: 0.25; pointer-events: none; }
  body.free-mode .volume-section { opacity: 0.25; pointer-events: none; }
  body.free-mode .progress-bar { pointer-events: none; }

  /* Progress */
  .progress-section { padding: 16px 28px 4px; flex-shrink: 0; }
  .progress-bar { height: 4px; border-radius: 2px; cursor: pointer; position: relative; padding: 10px 0; margin: -10px 0; }
  .progress-track { height: 4px; background: var(--surface3); border-radius: 2px; position: relative; }
  .progress-fill { height: 100%; background: #fff; border-radius: 2px; width: 0%; transition: width 0.5s linear; position: relative; }
  .progress-fill::after {
    content: ''; position: absolute; right: -6px; top: 50%; transform: translateY(-50%);
    width: 12px; height: 12px; border-radius: 50%; background: #fff; opacity: 0; transition: opacity 0.15s;
  }
  .progress-bar:active .progress-fill::after { opacity: 1; }
  .time-row { display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

  /* Controls */
  .controls { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; flex-shrink: 0; }
  .ctrl {
    background: none; border: none; cursor: pointer; color: var(--muted);
    padding: 10px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; transition: color 0.15s, transform 0.1s;
  }
  .ctrl:active { transform: scale(0.88); color: #fff; }
  .ctrl.active { color: var(--green); }
  .ctrl.play { width: 64px; height: 64px; background: #fff; color: #000; padding: 0; border-radius: 50%; }
  .ctrl.play:active { background: #ddd; color: #000; transform: scale(0.94); }

  /* Volume */
  .volume-section { display: flex; align-items: center; gap: 10px; padding: 4px 28px 16px; flex-shrink: 0; }
  .vol-icon { color: var(--dim); flex-shrink: 0; }
  input[type=range] {
    -webkit-appearance: none; appearance: none; flex: 1; height: 4px;
    background: var(--surface3); border-radius: 2px; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #fff; cursor: pointer;
  }

  /* Nothing playing */
  .nothing-playing { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: var(--muted); font-size: 15px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--surface3); color: var(--text);
    padding: 10px 22px; border-radius: 100px; font-size: 13px;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 100; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Idle */
  .idle-overlay {
    position: absolute; inset: 0; z-index: 50; background: rgba(0,0,0,0);
    pointer-events: none; transition: background 1s;
    display: flex; align-items: center; justify-content: center;
  }
  .idle-overlay.idle { background: rgba(0,0,0,0.9); pointer-events: all; }
  .idle-time {
    font-size: 72px; font-weight: 300; letter-spacing: -2px;
    color: rgba(255,255,255,0.15); opacity: 0; transition: opacity 1s; font-variant-numeric: tabular-nums;
  }
  .idle-overlay.idle .idle-time { opacity: 1; }
</style>
</head>

<script>
const CLIENT_ID = 'c34376852a164c2d864705cd4f6b8494';
const REDIRECT_URI = 'https://elidder.github.io/car-thing/callback';
const SCOPES = ['user-read-playback-state','user-modify-playback-state',
  'user-read-currently-playing','user-library-read','user-library-modify'].join(' ');

let accessToken=null, tokenExpiry=0, currentTrackId=null;
let isPlaying=false, shuffleState=false, repeatState='off';
let trackDuration=0, trackProgress=0;
let progressInterval=null, idleTimer=null, pollTimer=null;
let isPremium = localStorage.getItem('sp_mode') !== 'free';

function setMode(mode) {
  isPremium = mode === 'premium';
  localStorage.setItem('sp_mode', mode);
  applyMode();
}
async function detectAccountType() {
  const data = await api('/me');
  if (!data) return;

  isPremium = data.product === 'premium';
  localStorage.setItem('sp_mode', isPremium ? 'premium' : 'free');

  applyMode();
}
function applyMode() {
  document.body.classList.toggle('free-mode', !isPremium);
  document.getElementById('authFreeBtn').classList.toggle('active', !isPremium);
  document.getElementById('authPremiumBtn').classList.toggle('active', isPremium);
  document.getElementById('settingsFreeBtn').classList.toggle('active', !isPremium);
  document.getElementById('settingsPremiumBtn').classList.toggle('active', isPremium);
}

function openSettings() { document.getElementById('settingsSheet').classList.add('open'); }
function closeSettingsOutside(e) {
  if (e.target === document.getElementById('settingsSheet'))
    document.getElementById('settingsSheet').classList.remove('open');
}

function randBase64() {
  const a = new Uint8Array(64); crypto.getRandomValues(a);
  return btoa(String.fromCharCode(...a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function challenge(v) {
  const d = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function startAuth() {
  const v = randBase64(); sessionStorage.setItem('pkce', v);
  const c = await challenge(v);
  location.href = 'https://accounts.spotify.com/authorize?' +
    new URLSearchParams({client_id:CLIENT_ID, response_type:'code',
      redirect_uri:REDIRECT_URI, code_challenge_method:'S256', code_challenge:c, scope:SCOPES});
}
async function exchangeCode(code) {
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body: new URLSearchParams({client_id:CLIENT_ID, grant_type:'authorization_code',
      code, redirect_uri:REDIRECT_URI, code_verifier:sessionStorage.getItem('pkce')})
  });
  const d = await res.json();
  if (d.access_token) {
    saveToken(d); sessionStorage.removeItem('pkce');
    history.replaceState({},'',' /car-thing/'); showPlayer();
  } else showToast('Ошибка входа');
}
function saveToken(d) {
  accessToken=d.access_token; tokenExpiry=Date.now()+d.expires_in*1000;
  localStorage.setItem('sp_token',accessToken); localStorage.setItem('sp_expiry',tokenExpiry);
  if (d.refresh_token) localStorage.setItem('sp_refresh',d.refresh_token);
}
async function refreshToken() {
  const r = localStorage.getItem('sp_refresh'); if (!r) return false;
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body: new URLSearchParams({client_id:CLIENT_ID, grant_type:'refresh_token', refresh_token:r})
  });
  const d = await res.json();
  if (d.access_token) { saveToken(d); return true; } return false;
}
async function getToken() {
  if (accessToken && Date.now()<tokenExpiry-30000) return accessToken;
  if (await refreshToken()) return accessToken;
  logout(); return null;
}
function logout() {
  ['sp_token','sp_expiry','sp_refresh'].forEach(k=>localStorage.removeItem(k));
  accessToken=null;
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('player-screen').classList.remove('visible');
  document.getElementById('settingsSheet').classList.remove('open');
  clearTimeout(pollTimer); clearInterval(progressInterval);
}
async function api(path, method='GET', body=null) {
  const token = await getToken(); if (!token) return null;
  const opts = {method, headers:{Authorization:'Bearer '+token}};
  if (body) {opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(body);}
  const res = await fetch('https://api.spotify.com/v1'+path, opts);
  if (res.status===204||res.status===202) return {};
  if (res.status===401) { logout(); return null; }
  if (res.status === 403) {
  return { error: 'forbidden' };
  }
  if (!res.ok) return null;
  return res.json().catch(()=>({}));
}

function showPlayer() {
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('player-screen').classList.add('visible');
  detectAccountType(); fetchState(); schedulePoll(); startProgressTick(); setupIdle();
}
function schedulePoll() {
  clearTimeout(pollTimer);
  pollTimer = setTimeout(()=>{ fetchState(); schedulePoll(); }, 3000);
}

async function fetchState() {
  let data = await api('/me/player');

  // fallback если нет доступа или устройства
  if (!data || data.error === 'forbidden' || !data.item) {
    data = await api('/me/player/currently-playing');
  }

  if (!data || !data.item) {
    document.getElementById('nothingPlaying').style.display='flex';
    document.getElementById('mainPlayer').style.display='none';
    isPlaying=false;
    return;
  }

  document.getElementById('nothingPlaying').style.display='none';
  document.getElementById('mainPlayer').style.display='contents';

  const track = data.item;
  isPlaying = data.is_playing;
  trackDuration = track.duration_ms;
  trackProgress = data.progress_ms;

  updatePlayBtn();
}

function setAmbient(url) {
  const tmp=new Image(); tmp.crossOrigin='anonymous';
  tmp.onload=()=>{
    const c=document.createElement('canvas'); c.width=c.height=4;
    const ctx=c.getContext('2d'); ctx.drawImage(tmp,0,0,4,4);
    let r=0,g=0,b=0;
    for(let i=0;i<4;i++) for(let j=0;j<4;j++){const d=ctx.getImageData(i,j,1,1).data;r+=d[0];g+=d[1];b+=d[2];}
    r=Math.round(r/16);g=Math.round(g/16);b=Math.round(b/16);
    document.getElementById('ambientBg').style.background=
      `radial-gradient(ellipse at 50% 0%, rgba(${r},${g},${b},0.5) 0%, #0a0a0a 65%)`;
  }; tmp.src=url;
}

async function checkLiked(id) {
  const d=await api('/me/tracks/contains?ids='+id);
  const liked=d?.[0]===true;
  document.getElementById('likeBtn').classList.toggle('liked',liked);
  document.getElementById('heartPath').setAttribute('fill',liked?'currentColor':'none');
}
async function toggleLike() {
  const btn=document.getElementById('likeBtn'), was=btn.classList.contains('liked');
  btn.classList.toggle('liked',!was);
  document.getElementById('heartPath').setAttribute('fill',!was?'currentColor':'none');
  await api('/me/tracks?ids='+currentTrackId, was?'DELETE':'PUT');
}
async function togglePlay() {
  if (!isPremium) return;
  isPlaying=!isPlaying; updatePlayBtn();
  document.getElementById('albumContainer').className='album-container '+(isPlaying?'playing':'paused');
  await api('/me/player/'+(isPlaying?'play':'pause'),'PUT');
}
function updatePlayBtn() {
  document.getElementById('playIcon').innerHTML=isPlaying
    ?'<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>'
    :'<polygon points="5 3 19 12 5 21 5 3"/>';
}
async function prevTrack() { if(!isPremium)return; await api('/me/player/previous','POST'); setTimeout(fetchState,400); }
async function nextTrack() { if(!isPremium)return; await api('/me/player/next','POST'); setTimeout(fetchState,400); }
async function toggleShuffle() {
  if(!isPremium)return; shuffleState=!shuffleState; updateShuffleBtn();
  await api('/me/player/shuffle?state='+shuffleState,'PUT');
}
function updateShuffleBtn() { document.getElementById('shuffleBtn').classList.toggle('active',shuffleState); }
async function cycleRepeat() {
  if(!isPremium)return;
  const s=['off','context','track']; repeatState=s[(s.indexOf(repeatState)+1)%3];
  updateRepeatBtn(); await api('/me/player/repeat?state='+repeatState,'PUT');
}
function updateRepeatBtn() { document.getElementById('repeatBtn').classList.toggle('active',repeatState!=='off'); }
async function seekTo(e) {
  if(!isPremium)return;
  const bar=e.currentTarget;
  const pct=Math.max(0,Math.min(1,(e.clientX-bar.getBoundingClientRect().left)/bar.offsetWidth));
  trackProgress=Math.round(pct*trackDuration);
  document.getElementById('progressFill').style.width=(pct*100).toFixed(2)+'%';
  document.getElementById('timeNow').textContent=fmtMs(trackProgress);
  await api('/me/player/seek?position_ms='+trackProgress,'PUT');
}
let volDebounce;
function setVolume(v) {
  if(!isPremium)return;
  clearTimeout(volDebounce);
  volDebounce=setTimeout(()=>api('/me/player/volume?volume_percent='+v,'PUT'),300);
}
function startProgressTick() {
  clearInterval(progressInterval);
  progressInterval=setInterval(()=>{
    if(!isPlaying||trackDuration===0)return;
    trackProgress=Math.min(trackProgress+1000,trackDuration);
    document.getElementById('progressFill').style.width=(trackProgress/trackDuration*100).toFixed(2)+'%';
    document.getElementById('timeNow').textContent=fmtMs(trackProgress);
  },1000);
}
function fmtMs(ms) { const s=Math.floor(ms/1000); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function setupIdle() {
  ['touchstart','click','touchmove'].forEach(e=>document.addEventListener(e,resetIdle,{passive:true}));
  resetIdle();
}
function resetIdle() {
  clearTimeout(idleTimer); document.getElementById('idleOverlay').classList.remove('idle');
  idleTimer=setTimeout(()=>{ document.getElementById('idleOverlay').classList.add('idle'); tickIdleClock(); },60000);
}
function tickIdleClock() {
  if(!document.getElementById('idleOverlay').classList.contains('idle'))return;
  const n=new Date();
  document.getElementById('idleTime').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  setTimeout(tickIdleClock,10000);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

(async()=>{
  applyMode();
  let search=location.search;
  if (!search&&sessionStorage.getItem('oauth_redirect')) {
    search=sessionStorage.getItem('oauth_redirect');
    sessionStorage.removeItem('oauth_redirect');
  }
  const params=new URLSearchParams(search), code=params.get('code');
  if (code) { history.replaceState({},'','/car-thing/'); await exchangeCode(code); return; }
  const token=localStorage.getItem('sp_token');
  const expiry=parseInt(localStorage.getItem('sp_expiry')||'0');
  const refresh=localStorage.getItem('sp_refresh');
  if (token&&(Date.now()<expiry-30000||refresh)) { accessToken=token; tokenExpiry=expiry; showPlayer(); }
})();
</script>
